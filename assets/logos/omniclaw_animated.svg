<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bgGrad)"/>
  <g opacity="0.15">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#58a6ff">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#58a6ff">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#58a6ff">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#58a6ff">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  <g transform="translate(50, 40)">
    <path d="M50 0 L100 20 L100 60 Q100 100 50 120 Q0 100 0 60 L0 20 Z" fill="url(#shieldGrad)" stroke="#3fb950" stroke-width="3"/>
    <path d="M30 55 L45 70 L70 40" fill="none" stroke="white" stroke-width="8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="250" y="90" font-family="monospace" font-size="52" font-weight="bold" fill="white">OmniClaw</text>
  <text x="250" y="120" font-family="monospace" font-size="16" fill="#8b949e">Unified CI/CD Security Scanner</text>
  <g transform="translate(250, 140)">
    <rect width="10" height="25" fill="#58a6ff" rx="3">
      <animate attributeName="x" values="0;320;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect width="10" height="25" fill="#238636" rx="3">
      <animate attributeName="x" values="0;320;0" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect width="10" height="25" fill="#f85149" rx="3">
      <animate attributeName="x" values="0;320;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g transform="translate(600, 170)">
    <circle r="5" fill="#238636">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="5" font-family="monospace" font-size="11" fill="#238636">SECURE</text>
  </g>
  <g transform="translate(700, 170)">
    <circle r="5" fill="#58a6ff">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="5" font-family="monospace" font-size="11" fill="#58a6ff">SCANNING</text>
  </g>
</svg>
